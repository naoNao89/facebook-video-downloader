name: Release

on:
  push:
    tags:
      - 'v*'

# Prevent multiple release builds
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Facebook Video Downloader ${{ github.ref }}
        draft: false
        prerelease: false
        body: |
          ## What's Changed
          
          ### 🎉 New Features
          - Enhanced video extraction capabilities
          - Improved user interface
          - Better error handling and user feedback
          
          ### 🐛 Bug Fixes
          - Fixed various download issues
          - Improved stability and performance
          
          ### 📦 Installation
          
          **Windows**: Download the `.msi` installer
          **macOS**: Download the `.dmg` file
          **Linux**: Download the `.deb` package or `.AppImage`
          
          ### 🔧 Requirements
          - FFmpeg (for DASH stream combination)
          - Internet connection for video extraction
          
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/v0.0.0...${{ github.ref_name }}

  build-release:
    name: Build Release
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
            target: 'universal-apple-darwin'
          - platform: 'ubuntu-20.04'
            args: ''
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: ''
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 8
        run_install: false

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install system dependencies (Ubuntu)
      if: matrix.platform == 'ubuntu-20.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Cache pnpm dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install frontend dependencies
      run: pnpm install

    - name: Install Rust tools
      run: |
        cargo install trunk --locked
        cargo install tauri-cli --locked

    - name: Install optimization tools
      run: |
        # Install wasm-opt for WASM optimization
        curl -L https://github.com/WebAssembly/binaryen/releases/download/version_116/binaryen-version_116-x86_64-linux.tar.gz | tar xz
        sudo cp binaryen-version_116/bin/wasm-opt /usr/local/bin/ || true
        # Install svgo for SVG optimization
        npm install -g svgo || true

    - name: Build frontend
      run: trunk build --release

    - name: Optimize frontend assets
      run: |
        # Optimize WASM files if wasm-opt is available
        if command -v wasm-opt >/dev/null 2>&1; then
          find dist -name "*.wasm" -exec wasm-opt -Oz {} -o {} \;
          echo "✅ WASM files optimized"
        fi

        # Optimize SVG files if svgo is available
        if command -v svgo >/dev/null 2>&1; then
          find dist -name "*.svg" -exec svgo {} \;
          echo "✅ SVG files optimized"
        fi

    - name: Build Tauri app
      run: cargo tauri build ${{ matrix.args }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    - name: Generate build summary
      run: |
        echo "## 🚀 Release Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "### Platform: ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY
        echo "### Target: ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
        echo "### Build Time: $(date)" >> $GITHUB_STEP_SUMMARY

        # Show bundle sizes
        if [ -d "dist" ]; then
          echo "### Frontend Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo "- Total: $(du -sh dist | cut -f1)" >> $GITHUB_STEP_SUMMARY
          if [ -n "$(find dist -name "*.wasm" 2>/dev/null)" ]; then
            echo "- WASM: $(find dist -name "*.wasm" -exec du -ch {} + | grep total | cut -f1)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "$(find dist -name "*.js" 2>/dev/null)" ]; then
            echo "- JS: $(find dist -name "*.js" -exec du -ch {} + | grep total | cut -f1)" >> $GITHUB_STEP_SUMMARY
          fi
        fi

    - name: Upload Release Assets (Windows)
      if: matrix.platform == 'windows-latest'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./src-tauri/target/release/bundle/msi/Facebook Video Downloader_*_x64_en-US.msi
        asset_name: facebook-video-downloader-windows-x64.msi
        asset_content_type: application/octet-stream

    - name: Upload Release Assets (macOS)
      if: matrix.platform == 'macos-latest'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./src-tauri/target/universal-apple-darwin/release/bundle/dmg/Facebook Video Downloader_*_universal.dmg
        asset_name: facebook-video-downloader-macos-universal.dmg
        asset_content_type: application/octet-stream

    - name: Upload Release Assets (Linux DEB)
      if: matrix.platform == 'ubuntu-20.04'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./src-tauri/target/release/bundle/deb/facebook-video-downloader_*_amd64.deb
        asset_name: facebook-video-downloader-linux-amd64.deb
        asset_content_type: application/octet-stream

    - name: Upload Release Assets (Linux AppImage)
      if: matrix.platform == 'ubuntu-20.04'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./src-tauri/target/release/bundle/appimage/facebook-video-downloader_*_amd64.AppImage
        asset_name: facebook-video-downloader-linux-amd64.AppImage
        asset_content_type: application/octet-stream

  publish-release:
    name: Publish Release
    needs: [create-release, build-release]
    runs-on: ubuntu-latest
    steps:
    - name: Publish Release
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          github.rest.repos.updateRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: ${{ needs.create-release.outputs.release_id }},
            draft: false
          })
